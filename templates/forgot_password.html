<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <style>

        :root{

            --navy:#0f172a;
            --navy-light:#1e293b;

            --gold:#f59e0b;

            --bg:#f8fafc;

            --card:#ffffff;

            --text:#0f172a;
            --muted:#64748b;

        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            background:var(--bg);

            font-family:
                'Segoe UI',
                sans-serif;

            padding:20px;
        }

        .card{

            width:100%;
            max-width:550px;

            background:var(--card);

            border-radius:24px;

            padding:40px;

            text-align:center;

            box-shadow:
                0 10px 30px
                rgba(15,23,42,0.08);

        }

        .icon{

            width:80px;
            height:80px;

            margin:auto;

            border-radius:50%;

            background:#fff7ed;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:34px;

            margin-bottom:20px;
        }

        h1{

            color:var(--navy);

            margin-bottom:15px;

            font-size:28px;
        }

        p{

            color:var(--muted);

            line-height:1.7;

            margin-bottom:12px;
        }

        .note{

            margin-top:20px;

            padding:16px;

            border-radius:12px;

            background:#fffbeb;

            color:#92400e;

            font-size:14px;
        }

        .btn{

            display:inline-block;

            margin-top:25px;

            background:var(--navy);

            color:white;

            text-decoration:none;

            padding:12px 28px;

            border-radius:12px;

            font-weight:600;

            transition:0.2s;
        }

        .btn:hover{

            background:var(--navy-light);
        }

    </style>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">

</head>

<body>

    <div class="card">

        <div class="icon">

            🔐

        </div>

        <h1>

            Forgot Password

        </h1>

        <p>

            Password reset functionality has not
            been enabled in this academic project.

        </p>

        <p>

            Please contact the System Administrator
            to reset your account password.

        </p>

        <div class="note">

            Future Enhancement:
            Email-based OTP verification and
            secure password recovery workflow.

        </div>

        <a
            href="/"
            class="btn"
        >
            Back to Login
        </a>

    </div>

</body>

</html>
