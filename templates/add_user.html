<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add User - STMS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            background:var(--cream);
            color:#0f172a;
            display:flex;
        }

        a{
            text-decoration:none;
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar{
            width:220px;
            min-height:100vh;
            background:
                linear-gradient(
                    180deg,
                    #071226 0%,
                    #081933 100%
                );
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            position:fixed;
            left:0;
            top:0;
            border-right:1px solid rgba(255,255,255,0.04);
        }

        .sidebar-top{
            padding:22px 0;
        }

        .logo{
            display:flex;
            align-items:flex-start;
            gap:14px;
            padding:0 18px 22px;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }

        .logo-icon{
            width:30px;
            height:30px;
            background:#facc15;
            border-radius:10px;
            flex-shrink:0;
        }

        .logo-text h2{
            font-size:15px;
            font-weight:800;
            margin-bottom:6px;
        }

        .logo-text p{
            color: var(--gold-lt);
            font-size:10px;
            line-height:1.4;
            font-weight:700;
            letter-spacing:0.4px;
        }

        .menu{
            padding:18px 10px;
        }

        .menu-title{
            font-size:10px;
            font-weight:700;
            letter-spacing:1.2px;
            color:#7c8aa5;
            margin-bottom:14px;
            padding-left:10px;
        }

        .nav-item{
            display:flex;
            align-items:center;
            gap:12px;
            padding:14px 14px;
            border-radius:14px;
            color:#d6deea;
            font-size:14px;
            font-weight:500;
            margin-bottom:6px;
            transition:0.2s;
            position:relative;
        }

        .nav-item:hover{
            background:#0f1f39;
        }

        .nav-item.active{
            background:
                linear-gradient(
                    90deg,
                    rgba(250,204,21,0.12),
                    rgba(250,204,21,0.03)
                );

            border:1px solid rgba(250,204,21,0.16);

            color: var(--gold-lt);
        }

        .nav-item.active::before{
            content:'';
            position:absolute;
            left:-10px;
            top:12px;
            width:3px;
            height:24px;
            background:var(--gold-lt);
            border-radius:999px;
        }

        .nav-item svg{
            width:16px;
            height:16px;
            stroke-width:2;
        }

        /* =========================
           MAIN
        ========================== */

        .main{
            margin-left:220px;
            width:calc(100% - 220px);
            padding:26px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            margin-bottom:24px;
        }

        .page-title h1{
            font-size:22px;
            font-weight:800;
            margin-bottom:6px;
        }

        .breadcrumb{
            color:var(--text-3);
            font-size:12px;
        }

        .breadcrumb span{
            color:#d4a72c;
            font-weight:600;
        }

        .date-pill{
            background:var(--surface)
            border:1px solid #e8e1d8;
            border-radius:12px;
            padding:11px 16px;
            font-size:12px;
            color:var(--text-3);
            font-weight:500;
        }

        /* =========================
           FORM PANEL
        ========================== */

        .form-panel{
            background:var(--surface);
            border:1px solid var(--border-lt);
            border-radius:24px;
            overflow:hidden;
            max-width:760px;
        }

        .panel-header{
            padding:20px 24px;
            border-bottom:1px solid var(--border-lt);
            display:flex;
            align-items:center;
            gap:10px;
        }

        .panel-dot{
            width:8px;
            height:8px;
            border-radius:50%;
            background:#d4a72c;
        }

        .panel-header h2{
            font-size:18px;
            font-weight:700;
        }

        .form-content{
            padding:30px 24px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full{
            grid-column:1 / -1;
        }

        .form-group label{
            font-size:13px;
            font-weight:600;
            margin-bottom:10px;
            color:var(--text-2);
        }

        .form-group input,
        .form-group select{
            padding:14px 16px;
            border:1px solid #ddd6cb;
            border-radius:14px;
            background:var(--surface);
            font-size:14px;
            outline:none;
            transition:0.2s;
        }

        .form-group input:focus,
        .form-group select:focus{
            border-color:#d4a72c;
            box-shadow:0 0 0 4px rgba(212,167,44,0.08);
        }

        .form-actions{
            margin-top:30px;
            display:flex;
            gap:14px;
        }

        .submit-btn{
            background:var(--surface);
            color:var(--gold-lt);
            border:none;
            padding:14px 22px;
            border-radius:14px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
        }

        .submit-btn:hover{
            opacity:0.92;
        }

        .cancel-btn{
            background:var(--surface);
            color:var(--gold-lt);;
            padding:14px 22px;
            border-radius:14px;
            font-size:14px;
            font-weight:600;
            border:none;
            cursor:pointer;
        }

    </style>
<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/dark-mode.css') }}"
>
</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="sidebar-top">

            <div class="logo">

                <div class="logo-icon"></div>

                <div class="logo-text">

                    <h2>STMS</h2>

                    <p>
                        SECURE TICKET<br>
                        MANAGEMENT
                    </p>

                </div>

            </div>

            <div class="menu">

                <div class="menu-title">
                    MAIN MENU
                </div>

                <a href="/admin-dashboard"
                   class="nav-item">

                    <svg viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor">

                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>

                    </svg>

                    All Tickets

                </a>

                <a href="/manage-users"
                   class="nav-item active">

                    <svg viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor">

                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

                    </svg>

                    Manage Users

                </a>

                <a href="/archived-tickets"
                   class="nav-item">

                    <svg viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor">

                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5"/>
                        <line x1="10" y1="12" x2="14" y2="12"/>

                    </svg>

                    Archived Tickets

                </a>

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- TOPBAR -->

        <div class="topbar">

            <div class="page-title">

                <h1>Add User</h1>

                <div class="breadcrumb">

                    STMS &nbsp;›&nbsp;
                    <span>User Management</span>

                </div>

            </div>

            <div class="date-pill"
                 id="live-date">
            </div>

        </div>

        <!-- FORM -->

        <div class="form-panel">

            <div class="panel-header">

                <div class="panel-dot"></div>

                <h2>Create New User</h2>

            </div>

            <div class="form-content">

                <form method="POST">

                    <div class="form-grid">

                        <!-- FULL NAME -->

                        <div class="form-group">

                            <label>Full Name</label>

                            <input type="text"
                                   name="full_name"
                                   required>

                        </div>

                        <!-- USERNAME -->

                        <div class="form-group">

                            <label>Username</label>

                            <input type="text"
                                   name="username"
                                   required>

                        </div>

                        <!-- EMAIL -->

                        <div class="form-group">

                            <label>Email Address</label>

                            <input type="email"
                                   name="email"
                                   required>

                        </div>

                        <!-- PASSWORD -->

                        <div class="form-group">

                            <label>Password</label>

                            <input type="password"
                                   name="password"
                                   required>

                        </div>

                        <!-- ROLE -->

                        <div class="form-group full">

                            <label>User Role</label>

                            <select name="role" required>

                                <option value="">Select Role</option>

                                <option value="admin">Admin</option>

                                <option value="manager">Manager</option>

                                <option value="engineer">Engineer</option>

                                <option value="customer">Customer</option>

                            </select>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="form-actions">

                        <button type="submit"
                                class="submit-btn">

                            Create User

                        </button>

                        <a href="/manage-users">

                            <button type="button"
                                    class="cancel-btn">

                                Cancel

                            </button>

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <script>

        const d = new Date();

        document.getElementById('live-date').textContent =
            d.toLocaleDateString(
                'en-GB',
                {
                    weekday:'long',
                    day:'numeric',
                    month:'long',
                    year:'numeric'
                }
            );

    </script>
<script
    src="{{ url_for('static', filename='js/dark-mode.js') }}"
></script>
</body>
</html>
